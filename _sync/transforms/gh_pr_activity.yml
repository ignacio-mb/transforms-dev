name: Github PR Activity
description: 'Weekly PR activity with review turnaround and merge rates. Powers engineering velocity dashboards.

  '
entity_id: ceUBSqb44aj0ng5ARKoP7
type: transform
query_type: native
database_id: Data Warehouse
dataset_query:
  database: Data Warehouse
  type: native
  native:
    query: |-
      -- GitHub Pull Request Activity
      --
      -- Weekly summary of PR activity by author, including review turnaround
      -- and merge rates. Source for engineering velocity dashboards.

      WITH prs AS (
        SELECT
          id,
          number,
          repository,
          user_login AS author,
          title,
          state,
          created_at,
          merged_at,
          closed_at,
          updated_at,
          additions,
          deletions,
          changed_files
        FROM staging.github_pull_requests
        WHERE created_at >= CURRENT_DATE - INTERVAL '90 days'
      ),

      reviews AS (
        SELECT
          pull_request_id,
          min(submitted_at) AS first_review_at
        FROM staging.github_pull_request_reviews
        GROUP BY 1
      ),

      final AS (
        SELECT
          p.id,
          p.number,
          p.repository,
          p.author,
          p.title,
          p.state,
          p.created_at,
          p.merged_at,
          p.closed_at,
          p.additions,
          p.deletions,
          p.changed_files,
          p.additions + p.deletions AS total_lines_changed,
          r.first_review_at,
          EXTRACT(EPOCH FROM (r.first_review_at - p.created_at)) / 3600 AS hours_to_first_review,
          EXTRACT(EPOCH FROM (p.merged_at - p.created_at)) / 3600 AS hours_to_merge,
          date_trunc('week', p.created_at) AS created_week
        FROM prs p
        LEFT JOIN reviews r ON p.id = r.pull_request_id
      )

      SELECT * FROM final
archived: false
transform:
  target_schema: github
  target_table: gh_pr_activity
  incremental: true
  checkpoint_column: created_at
  tags:
  - daily
  - engineering
folder: Engineering
