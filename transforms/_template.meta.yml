# Metadata for this transform. Used by `make build` to generate serialization YAML.
#
# Required fields: display_name, description, table_name
# Optional fields: schema (defaults from transforms.yml), tags, incremental, entity_id

display_name: My Transform
description: >
  Brief description of what this transform produces and who uses it.

# Target table name in the database (what Metabase writes results into)
table_name: my_transform

# Override schema (defaults to domain mapping in transforms.yml)
# schema: custom_schema

# Tags group transforms for scheduling via Jobs in Metabase
tags:
  - daily

# Set to true for append-only / incremental transforms
incremental: false
# checkpoint_column: updated_at  # required if incremental: true

# Entity ID — leave blank on first build (auto-generated).
# Once this transform exists in Metabase, paste the entity_id here
# so future builds don't create duplicates.
# entity_id: null
