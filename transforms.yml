# transforms.yml — project configuration
#
# Configured for Supabase test environment.
# The database name must match exactly what appears in Metabase's Admin → Databases.

project:
  name: bi_transforms
  database: Supabase

default_schema: transforms

domains:
  customers:
    schema: transforms
    folder: Customers
  revenue:
    schema: transforms
    folder: Revenue
  support:
    schema: transforms
    folder: Support
  product:
    schema: transforms
    folder: Product

snippets_dir: snippets
