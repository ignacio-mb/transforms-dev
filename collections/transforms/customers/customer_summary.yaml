source:
  query:
    database: Supabase
    stages:
    - native: |
        -- Customer Summary
        --
        -- One row per customer with enriched fields: lifetime revenue,
        -- ticket counts, activity metrics, and health status.
        -- The "customers" transform that everything else joins to.

        WITH lifetime_revenue AS (
          SELECT
            customer_id,
            count(*) AS total_invoices,
            count(*) FILTER (WHERE status = 'paid') AS paid_invoices,
            coalesce(sum(amount) FILTER (WHERE status = 'paid'), 0) AS lifetime_revenue,
            min(issued_at) AS first_invoice_at,
            max(issued_at) AS last_invoice_at
          FROM raw.invoices
          GROUP BY 1
        ),

        ticket_stats AS (
          SELECT
            customer_id,
            count(*) AS total_tickets,
            count(*) FILTER (WHERE severity IN ('high', 'critical')) AS urgent_tickets,
            count(*) FILTER (WHERE status NOT IN ('resolved', 'closed')) AS open_tickets,
            avg(EXTRACT(EPOCH FROM (first_reply_at - created_at)) / 3600)
              FILTER (WHERE first_reply_at IS NOT NULL) AS avg_hours_to_first_reply
          FROM raw.support_tickets
          GROUP BY 1
        ),

        usage AS (
          SELECT
            customer_id,
            count(DISTINCT event_date) AS active_days,
            sum(event_count) AS total_events,
            max(event_date) AS last_active_date
          FROM raw.product_events
          WHERE event_date >= CURRENT_DATE - INTERVAL '30 days'
          GROUP BY 1
        ),

        final AS (
          SELECT
            c.id,
            c.name,
            c.email,
            c.company,
            c.plan,
            c.billing_cycle,
            c.mrr,
            c.mrr * 12 AS arr,
            c.country,
            c.signed_up_at,
            c.churned_at,
            c.is_active,

            -- Revenue
            coalesce(r.lifetime_revenue, 0) AS lifetime_revenue,
            r.total_invoices,
            r.paid_invoices,

            -- Support
            coalesce(t.total_tickets, 0) AS total_tickets,
            coalesce(t.urgent_tickets, 0) AS urgent_tickets,
            coalesce(t.open_tickets, 0) AS open_tickets,
            round(t.avg_hours_to_first_reply::numeric, 1) AS avg_hours_to_first_reply,

            -- Usage (last 30 days)
            coalesce(u.active_days, 0) AS active_days_30d,
            coalesce(u.total_events, 0) AS total_events_30d,
            u.last_active_date,

            -- Health score
            CASE
              WHEN NOT c.is_active THEN 'churned'
              WHEN c.plan = 'free' THEN 'free'
              WHEN u.last_active_date IS NULL
                OR u.last_active_date < CURRENT_DATE - INTERVAL '14 days' THEN 'red'
              WHEN t.open_tickets > 2 OR t.urgent_tickets > 1 THEN 'red'
              WHEN u.active_days < 5 THEN 'yellow'
              WHEN t.total_tickets > 5 THEN 'yellow'
              ELSE 'green'
            END AS health_status,

            -- Derived
            CURRENT_DATE - c.signed_up_at::date AS days_since_signup,
            c.email LIKE '%@gmail.com'
              OR c.email LIKE '%@yahoo.com'
              OR c.email LIKE '%@hotmail.com' AS is_free_email
          FROM raw.customers c
          LEFT JOIN lifetime_revenue r ON c.id = r.customer_id
          LEFT JOIN ticket_stats t ON c.id = t.customer_id
          LEFT JOIN usage u ON c.id = u.customer_id
        )

        SELECT * FROM final
      lib/type: mbql.stage/native
    lib/type: mbql/query
  type: query
