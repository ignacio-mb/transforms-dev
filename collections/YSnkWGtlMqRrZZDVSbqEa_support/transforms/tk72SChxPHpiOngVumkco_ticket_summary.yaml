source:
  query:
    database: Supabase
    native:
      query: |
        -- Support Ticket Summary
        --
        -- Enriched support tickets with customer context and SLA metrics.
        -- One row per ticket with response and resolution times.

        WITH final AS (
          SELECT
            t.id AS ticket_id,
            t.subject,
            t.severity,
            t.status,
            t.channel,
            t.created_at,
            t.first_reply_at,
            t.resolved_at,

            -- SLA metrics (in hours)
            round(
              EXTRACT(EPOCH FROM (t.first_reply_at - t.created_at)) / 3600, 1
            ) AS hours_to_first_reply,
            round(
              EXTRACT(EPOCH FROM (t.resolved_at - t.created_at)) / 3600, 1
            ) AS hours_to_resolution,

            -- SLA compliance (enterprise: 1h reply, pro: 4h, starter: 8h)
            CASE
              WHEN t.first_reply_at IS NULL THEN false
              WHEN c.plan = 'enterprise'
                AND EXTRACT(EPOCH FROM (t.first_reply_at - t.created_at)) / 3600 <= 1 THEN true
              WHEN c.plan = 'pro'
                AND EXTRACT(EPOCH FROM (t.first_reply_at - t.created_at)) / 3600 <= 4 THEN true
              WHEN c.plan IN ('starter', 'free')
                AND EXTRACT(EPOCH FROM (t.first_reply_at - t.created_at)) / 3600 <= 8 THEN true
              ELSE false
            END AS sla_met,

            -- Customer context
            c.name AS customer_name,
            c.company,
            c.plan,
            c.mrr,
            c.country,
            c.is_active AS customer_is_active,
            t.customer_id,

            -- Time dimensions
            date_trunc('week', t.created_at)::date AS created_week,
            date_trunc('month', t.created_at)::date AS created_month
          FROM raw.support_tickets t
          JOIN raw.customers c ON t.customer_id = c.id
        )

        SELECT * FROM final
    type: native
  type: query
